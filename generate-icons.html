<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TimFit Icon Generator</title>
<style>
  body { font-family: -apple-system, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
  canvas { display: block; margin: 16px 0; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  button { background: #007AFF; color: white; border: none; border-radius: 10px; padding: 12px 24px;
           font-size: 16px; font-weight: 600; cursor: pointer; margin: 8px 0; display: block; }
  button:active { opacity: 0.8; }
  p { color: #666; font-size: 14px; }
</style>
</head>
<body>
<h1>TimFit Icon Generator</h1>
<p>Run this page in any browser to generate the required PNG icons, then save them to <code>assets/icons/</code></p>

<div id="icons"></div>

<script>
const sizes = [
  { name: 'icon-192.png', size: 192, radius: 43 },
  { name: 'icon-512.png', size: 512, radius: 115 },
  { name: 'icon-maskable.png', size: 512, radius: 0 },
  { name: 'apple-touch-icon.png', size: 180, radius: 40 }
];

const container = document.getElementById('icons');

sizes.forEach(({ name, size, radius }) => {
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  const r = radius;

  // Background gradient
  const grad = ctx.createLinearGradient(0, 0, size, size);
  grad.addColorStop(0, '#007AFF');
  grad.addColorStop(1, '#0056CC');

  // Rounded rect
  if (r > 0) {
    ctx.beginPath();
    ctx.moveTo(r, 0);
    ctx.lineTo(size - r, 0);
    ctx.quadraticCurveTo(size, 0, size, r);
    ctx.lineTo(size, size - r);
    ctx.quadraticCurveTo(size, size, size - r, size);
    ctx.lineTo(r, size);
    ctx.quadraticCurveTo(0, size, 0, size - r);
    ctx.lineTo(0, r);
    ctx.quadraticCurveTo(0, 0, r, 0);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  } else {
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);
  }

  // TF text
  const fs = Math.round(size * 0.41);
  ctx.fillStyle = 'white';
  ctx.font = `800 ${fs}px -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('TF', size / 2, size / 2 + fs * 0.04);

  // Download button
  const wrapper = document.createElement('div');
  wrapper.style.marginBottom = '24px';

  const label = document.createElement('h3');
  label.textContent = `${name} (${size}×${size})`;
  label.style.margin = '0 0 8px';

  const small = document.createElement('canvas');
  const displaySize = Math.min(size, 256);
  small.width = displaySize;
  small.height = displaySize;
  small.getContext('2d').drawImage(canvas, 0, 0, displaySize, displaySize);
  small.style.borderRadius = (radius / size * displaySize) + 'px';

  const btn = document.createElement('button');
  btn.textContent = `⬇ Download ${name}`;
  btn.onclick = () => {
    const a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = name;
    a.click();
  };

  wrapper.appendChild(label);
  wrapper.appendChild(small);
  wrapper.appendChild(btn);
  container.appendChild(wrapper);
});
</script>
</body>
</html>
